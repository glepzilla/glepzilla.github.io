name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Build site
        run: npm run build

  build:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push site image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Upload deploy files
        uses: actions/upload-artifact@v7
        with:
          name: deploy-files
          path: compose.yml
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read
    steps:
      - name: Download deploy files
        uses: actions/download-artifact@v8
        with:
          name: deploy-files
          path: .
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
      - name: Wait for healthy container
        shell: bash
        run: |
          container_id="$(docker compose ps -q site)"
          if [ -z "$container_id" ]; then
            echo "Site container was not created"
            docker compose ps
            exit 1
          fi

          for attempt in $(seq 1 30); do
            status="$(docker inspect --format '{{.State.Health.Status}}' "$container_id")"
            if [ "$status" = "healthy" ]; then
              docker compose ps
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              docker compose logs --tail=100 site
              exit 1
            fi
            sleep 2
          done

          echo "Site did not become healthy in time"
          docker compose logs --tail=100 site
          exit 1
      - name: Cleanup old images
        if: success()
        run: docker image prune -f
