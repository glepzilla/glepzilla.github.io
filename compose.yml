services:
  site:
    image: ghcr.io/glepzilla/glepzilla.github.io:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks: [proxy]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      traefik.enable: "true"
      traefik.http.routers.glepzilla.rule: "Host(`glepzilla.ru`)"
      traefik.http.routers.glepzilla.entrypoints: websecure
      traefik.http.routers.glepzilla.service: glepzilla
      traefik.http.routers.glepzilla-www.rule: "Host(`www.glepzilla.ru`)"
      traefik.http.routers.glepzilla-www.entrypoints: websecure
      traefik.http.routers.glepzilla-www.middlewares: glepzilla-www-redirect
      traefik.http.routers.glepzilla-www.service: glepzilla
      traefik.http.middlewares.glepzilla-www-redirect.redirectregex.regex: "^https?://www\\.glepzilla\\.ru/(.*)"
      traefik.http.middlewares.glepzilla-www-redirect.redirectregex.replacement: "https://glepzilla.ru/$${1}"
      traefik.http.middlewares.glepzilla-www-redirect.redirectregex.permanent: "true"
      traefik.http.services.glepzilla.loadbalancer.server.port: "8080"

networks:
  proxy:
    external: true
